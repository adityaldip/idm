services:
  postgres:
    image: postgres:16-alpine
    container_name: idm-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: idm
      POSTGRES_PASSWORD: idm123
      POSTGRES_DB: idm
    volumes:
      - idm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idm -d idm"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: idm-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  idm_postgres_data:
